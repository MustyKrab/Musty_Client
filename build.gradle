plugins {
    id 'java'
    id 'fabric-loom' version '1.0.13' // Last version before strict validation
}

loom {
    minecraftJar = file("lunar-26.1.2.jar")
    // NO mappings - we work obfuscated
    runs {
        client {
            programArgs "--version", "26.1.2"
        }
    }
}

repositories {
    mavenCentral()
}

dependencies {
    modImplementation "net.fabricmc:fabric-loader:0.14.24"
}
