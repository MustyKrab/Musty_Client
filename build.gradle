plugins {
    id 'java'
}

group = 'net.mustyclient'
version = '1.0'

repositories {
    mavenCentral()
    maven {
        name = "Fabric"
        url = "https://maven.fabricmc.net/"
    }
}

dependencies {
    // Fabric loader as a compile dep only
    compileOnly "net.fabricmc:fabric-loader:0.14.24"
    
    // Your lunar jar
    compileOnly files("lunar-26.1.2.jar")
}

java {
    sourceCompatibility = JavaVersion.VERSION_17
    targetCompatibility = JavaVersion.VERSION_17
}

tasks.compileJava {
    options.encoding = "UTF-8"
}

jar {
    from sourceSets.main.output
    manifest {
        attributes(
            'MixinConfigs': 'mixins.mustyclient.json',
            'Fabric-Loom-Remap': 'false'
        )
    }
    
    // Include fabric mod json
    from('src/main/resources') {
        include 'fabric.mod.json'
    }
}
